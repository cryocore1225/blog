<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2D231F"/>
      <stop offset="100%" stop-color="#1A1915"/>
    </linearGradient>
  </defs>
  <!-- 背景 — 活字块 -->
  <rect width="64" height="64" rx="12" fill="url(#bg)"/>
  <!-- 字面（光面） -->
  <rect x="10" y="10" width="44" height="44" rx="3" fill="#3A302A"/>
  <!-- 阳刻笔画：简约 "活" 的抽象几何 -->
  <!-- 撇 -->
  <line x1="30" y1="16" x2="22" y2="36" stroke="#DA7756" stroke-width="3.5" stroke-linecap="round"/>
  <!-- 横 -->
  <line x1="22" y1="28" x2="42" y2="28" stroke="#DA7756" stroke-width="3" stroke-linecap="round"/>
  <!-- 竖 -->
  <line x1="34" y1="18" x2="34" y2="46" stroke="#DA7756" stroke-width="3" stroke-linecap="round"/>
  <!-- 口（底部） -->
  <rect x="24" y="36" width="20" height="12" rx="1.5" fill="none" stroke="#C0A080" stroke-width="2.5"/>
  <!-- 一点高光 -->
  <circle cx="14" cy="14" r="2" fill="#DA7756" opacity="0.7"/>
</svg>
